<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Quiz Test - Preguntas Excluidas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <i class="fas fa-question-circle"></i>
                <span>Quiz Test</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link"><i class="fas fa-play"></i> Cuestionario</a></li>
                <li><a href="review.html" class="nav-link"><i class="fas fa-flag"></i> Repaso <span id="navReviewCount" class="nav-badge">0</span></a></li>
                <li><a href="excluded.html" class="nav-link active"><i class="fas fa-eye-slash"></i> Excluidas <span id="navExcludedCount" class="nav-badge">0</span></a></li>
                <li><a href="glossary.html" class="nav-link"><i class="fas fa-book"></i> Glosario</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="excluded-header">
            <h1><i class="fas fa-eye-slash"></i> Preguntas Excluidas</h1>
            <p>Estas preguntas no aparecerán en los tests. Puedes restaurarlas cuando quieras.</p>
        </div>

        <div id="excludedContainer" class="excluded-container">
            <!-- Las preguntas excluidas se cargarán aquí -->
        </div>
    </div>

    <script src="excluded.js"></script>
    <script src="menu.js"></script>
    
    <script>
        function setupMobileMenu() {
            if (document.querySelector('.menu-toggle')) return;
            
            const navContainer = document.querySelector('.nav-container');
            const navMenu = document.querySelector('.nav-menu');
            
            if (!navContainer || !navMenu) return;
            
            const menuToggle = document.createElement('div');
            menuToggle.className = 'menu-toggle';
            menuToggle.innerHTML = '<span></span><span></span><span></span>';
            
            const overlay = document.createElement('div');
            overlay.className = 'menu-overlay';
            
            navContainer.appendChild(menuToggle);
            document.body.appendChild(overlay);
            
            function toggleMenu(show) {
                if (show === undefined) {
                    menuToggle.classList.toggle('active');
                    navMenu.classList.toggle('active');
                    overlay.classList.toggle('active');
                } else if (show) {
                    menuToggle.classList.add('active');
                    navMenu.classList.add('active');
                    overlay.classList.add('active');
                } else {
                    menuToggle.classList.remove('active');
                    navMenu.classList.remove('active');
                    overlay.classList.remove('active');
                }
                
                if (navMenu.classList.contains('active')) {
                    document.body.style.overflow = 'hidden';
                } else {
                    document.body.style.overflow = '';
                }
            }
            
            menuToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleMenu();
            });
            
            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', () => toggleMenu(false));
            });
            
            overlay.addEventListener('click', () => toggleMenu(false));
            
            window.addEventListener('resize', () => {
                if (window.innerWidth > 768 && navMenu.classList.contains('active')) {
                    toggleMenu(false);
                }
            });
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && navMenu.classList.contains('active')) {
                    toggleMenu(false);
                }
            });
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', setupMobileMenu);
        } else {
            setupMobileMenu();
        }
    </script>
</body>
</html>
